# ============================================
# Nginx API Gateway — Clinic Appointment System
# HTTPS, Rate Limiting, Security Headers, Routing
# ============================================

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # ---- Logging ----
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # ---- Rate Limiting Zones ----
    # General: 30 requests/second per IP
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
    # Login: 5 requests/second per IP (stricter)
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/s;

    # ---- Request Size Limit ----
    client_max_body_size 10m;

    # ---- Upstream Services ----
    upstream auth_service {
        server auth-service:5000;
    }
    upstream appointment_service {
        server bussiness-service-1:5001;
    }
    upstream notification_service {
        server business-service-2:5002;
    }
    upstream logging_service {
        server logging-service:5003;
    }

    # ---- HTTP → HTTPS Redirect ----
    server {
        listen 80;
        server_name localhost;

        # Redirect all HTTP to HTTPS
        return 301 https://$host$request_uri;
    }

    # ---- HTTPS Server ----
    server {
        listen 443 ssl;
        server_name localhost;

        # ---- SSL Configuration ----
        ssl_certificate /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # ---- Security Headers ----
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'" always;

        # ---- Hide Server Version ----
        server_tokens off;

        # ---- Proxy Headers ----
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ---- Auth Service Routes ----
        # Login — stricter rate limit
        location /api/auth/login {
            limit_req zone=login burst=3 nodelay;
            limit_req_status 429;
            proxy_pass http://auth_service;
        }

        # Register — stricter rate limit
        location /api/auth/register {
            limit_req zone=login burst=3 nodelay;
            limit_req_status 429;
            proxy_pass http://auth_service;
        }

        # Other auth routes
        location /api/auth/ {
            limit_req zone=general burst=5 nodelay;
            limit_req_status 429;
            proxy_pass http://auth_service;
        }

        # ---- Appointment Service Routes ----
        location /api/appointments/ {
            limit_req zone=general burst=5 nodelay;
            limit_req_status 429;
            proxy_pass http://appointment_service;
        }

        # ---- Notification Service Routes ----
        location /api/notifications/ {
            limit_req zone=general burst=5 nodelay;
            limit_req_status 429;
            proxy_pass http://notification_service;
        }

        # ---- Logging Service Routes ----
        location /api/logs/ {
            limit_req zone=general burst=5 nodelay;
            limit_req_status 429;
            proxy_pass http://logging_service;
        }

        # ---- Health Check ----
        location /health {
            return 200 '{"status": "gateway healthy"}';
            add_header Content-Type application/json;
        }

        # ---- Block all other routes ----
        location / {
            return 404 '{"error": "Not found"}';
            add_header Content-Type application/json;
        }
    }
}
